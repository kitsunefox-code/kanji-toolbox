<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>あみだくじオンライン｜参加者と結果を入れてその場で引ける｜幹事の道具箱</title>
<meta name="description" content="参加者と結果を入力するだけで、その場で引けるあみだくじ。名前をタップすると経路をたどって結果が分かります。飲み会の順番決め・当番決め・景品決めに。登録不要・無料。">
<meta name="theme-color" content="#1b2a4a">
<meta property="og:title" content="あみだくじオンライン">
<meta property="og:description" content="参加者と結果を入れてタップするだけ。その場で引けるあみだくじ。">
<link rel="canonical" href="https://kusayakyu-navi.com/kanji-toolbox/amida.html">
<link rel="stylesheet" href="styles.css">
<script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-6423402285554400" crossorigin="anonymous"></script>
</head>
<body>
<div class="app has-bar">
  <header class="masthead tool">
    <a class="back" href="index.html" aria-label="道具箱にもどる">‹</a>
    <div class="brand-mark"><span class="kan">阿</span>あみだくじ</div>
  </header>

  <main>
    <section class="panel">
      <div class="amida-wrap"><canvas id="amida" width="320" height="300"></canvas></div>
      <p class="winner" id="res"></p>
      <p class="hint" style="text-align:center;margin-top:2px">上の名前をタップすると経路をたどります。</p>
    </section>

    <section class="panel">
      <div class="two-col">
        <div class="col">
          <label class="field-label" for="names">参加者（1行1人）</label>
          <textarea id="names" class="names-area" style="min-height:150px" spellcheck="false" aria-label="参加者">田中
佐藤
鈴木
高橋
渡辺</textarea>
        </div>
        <div class="col">
          <label class="field-label" for="prizes">結果（1行1つ）</label>
          <textarea id="prizes" class="names-area" style="min-height:150px" spellcheck="false" aria-label="結果">当たり🎉
はずれ
はずれ
はずれ
はずれ</textarea>
        </div>
      </div>
    </section>

    <section class="panel">
      <h2>全員の結果</h2>
      <ul class="amida-map" id="map"><li style="justify-content:center;color:var(--ink-mute)">「全員表示」を押すと一覧が出ます</li></ul>
    </section>
  </main>

  <footer>
    <h3>あみだくじオンラインとは</h3>
    <p>参加者と結果を入力するだけで、その場で引けるあみだくじです。上部の名前をタップすると、線をたどって当たった結果がハイライト表示されます。「引き直す」で線を作り直し、「全員表示」で全員の当たり先を一覧できます。飲み会の順番・当番・景品決めなどにどうぞ。</p>
    <div class="links"><a href="index.html">← ほかの幹事ツール</a></div>
  </footer>
</div>

<div class="settle">
  <div class="settle-actions">
    <button type="button" class="btn primary" id="redraw" style="flex:2">🎯 引き直す</button>
    <button type="button" class="btn ghost" id="all" style="flex:1">全員表示</button>
    <button type="button" class="btn line" id="line" style="flex:1">LINE</button>
  </div>
</div>
<div class="toast" id="toast">コピーしました</div>

<script>
(function(){
  var $=function(id){return document.getElementById(id)};
  var cv=$("amida"), ctx=cv.getContext("2d");
  var dpr=Math.max(1,Math.min(3,window.devicePixelRatio||1));
  var padX=30, y0=42, R=12, colGap=62;
  var N=0, W=320, H=300, y1=H-34, rungs={}, highlight=null;

  function names(){return $("names").value.split(/\n/).map(function(s){return s.trim();}).filter(function(s){return s.length;});}
  function prizes(){return $("prizes").value.split(/\n/).map(function(s){return s.trim();});}
  function colX(c){return padX+c*colGap;}
  function levelY(l){return y0+(l+1)*(y1-y0)/(R+1);}
  function has(l,c){return c>=0 && rungs[l] && rungs[l][c];}

  function generate(){
    var list=names(); N=Math.max(2,Math.min(10,list.length));
    W=padX*2+(N-1)*colGap; H=300; y1=H-34;
    cv.width=W*dpr; cv.height=H*dpr; cv.style.width=W+"px"; cv.style.height=H+"px";
    ctx.setTransform(dpr,0,0,dpr,0,0);
    rungs={};
    for(var l=0;l<R;l++){
      rungs[l]={}; var placed=-2;
      for(var c=0;c<N-1;c++){
        if(c===placed+1) continue;
        if(Math.random()<0.45){ rungs[l][c]=true; placed=c; }
      }
    }
    highlight=null; draw();
  }

  function trace(start){
    var pos=start, pts=[[colX(pos),y0]];
    for(var l=0;l<R;l++){
      var yl=levelY(l);
      if(has(l,pos)){ pts.push([colX(pos),yl]); pos+=1; pts.push([colX(pos),yl]); }
      else if(has(l,pos-1)){ pts.push([colX(pos),yl]); pos-=1; pts.push([colX(pos),yl]); }
    }
    pts.push([colX(pos),y1]);
    return {pts:pts, end:pos};
  }

  function draw(){
    var list=names(), pr=prizes();
    ctx.clearRect(0,0,W,H);
    // vertical lines
    ctx.lineWidth=2; ctx.strokeStyle="#d9d3c7"; ctx.lineCap="round";
    for(var c=0;c<N;c++){ ctx.beginPath(); ctx.moveTo(colX(c),y0); ctx.lineTo(colX(c),y1); ctx.stroke(); }
    // rungs
    for(var l=0;l<R;l++){ if(!rungs[l])continue; for(var cc=0;cc<N-1;cc++){ if(rungs[l][cc]){ var yl=levelY(l); ctx.beginPath(); ctx.moveTo(colX(cc),yl); ctx.lineTo(colX(cc+1),yl); ctx.stroke(); } } }
    // highlight path
    if(highlight!=null){
      var t=trace(highlight);
      ctx.lineWidth=4; ctx.strokeStyle="#e0a24a"; ctx.beginPath();
      t.pts.forEach(function(p,i){ i?ctx.lineTo(p[0],p[1]):ctx.moveTo(p[0],p[1]); }); ctx.stroke();
    }
    // labels
    ctx.font="700 12px 'Hiragino Kaku Gothic ProN','Yu Gothic',sans-serif"; ctx.textBaseline="middle";
    for(var i=0;i<N;i++){
      ctx.textAlign="center";
      ctx.fillStyle=(highlight===i)?"#c88a3a":"#1a1d26";
      ctx.fillText(cut(list[i]||""), colX(i), 16);
      var pz=pr[i]||"—";
      ctx.fillStyle="#35507e";
      ctx.fillText(cut(pz), colX(i), H-16);
    }
  }
  function cut(s){return s.length>5?s.slice(0,5):s;}

  function pick(e){
    var rect=cv.getBoundingClientRect();
    var x=(e.clientX-rect.left)*(W/rect.width);
    var c=Math.round((x-padX)/colGap);
    if(c<0||c>N-1)return;
    highlight=c; draw();
    var list=names(), pr=prizes(); var t=trace(c);
    $("res").textContent=(list[c]||"")+" → "+(pr[t.end]||"—");
    var w=$("res"); w.style.animation="none"; void w.offsetWidth; w.style.animation="pop .35s ease both";
  }
  cv.addEventListener("click",pick);

  function allMap(){
    var list=names(), pr=prizes(), ul=$("map"); ul.innerHTML="";
    for(var i=0;i<N;i++){ var t=trace(i);
      var li=document.createElement("li");
      li.innerHTML='<span>'+esc(list[i]||"")+'</span><span class="arrow">→</span><span class="to">'+esc(pr[t.end]||"—")+'</span>';
      ul.appendChild(li);
    }
  }
  function esc(s){return String(s).replace(/[&<>]/g,function(m){return {"&":"&amp;","<":"&lt;",">":"&gt;"}[m];});}
  function shareText(){
    var list=names(), pr=prizes(); var lines=["【あみだくじ】"];
    for(var i=0;i<N;i++){ var t=trace(i); lines.push("・"+(list[i]||"")+" → "+(pr[t.end]||"—")); }
    lines.push("— 幹事の道具箱"); return lines.join("\n");
  }
  function toast(msg){var t=$("toast");t.textContent=msg;t.classList.add("show");setTimeout(function(){t.classList.remove("show");},1600);}

  $("redraw").onclick=generate;
  $("all").onclick=allMap;
  $("names").addEventListener("input",generate);
  $("prizes").addEventListener("input",function(){draw();});
  $("line").onclick=function(){window.open("https://line.me/R/msg/text/?"+encodeURIComponent(shareText()),"_blank");};

  generate();
})();
</script>
</body>
</html>
